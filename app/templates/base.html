<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Networthy{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ version }}" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Networthy</a>
    <nav>
      {% if user %}
      <a href="/">Dashboard</a>
      <a href="/upload" class="btn">Upload CAS</a>
      <span class="user-email">{{ user.email }}</span>
      <form method="post" action="/logout">
        <button class="link-muted" type="submit">Log out</button>
      </form>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <span>Your data is private to your account. Statements are parsed on this server and never sent to third parties.</span>
  </footer>
</body>
</html>
